<!DOCTYPE html>
<html>

<head>
    <title>Edit Parking Entry</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">
        <div class="card shadow p-4">
            <h4 class="mb-4">Edit Parking Entry</h4>

            <form method="POST">

                <div class="mb-3">
                    <label class="form-label">Vehicle Number</label>
                    <input type="text" name="vehicle_number" value="{{ entry.vehicle_number }}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Parking Lot</label>
                    <select name="parking_lot" class="form-control" required>
                    <option value="A1" {% if entry.parking_lot == "A1" %}selected{% endif %}>A1</option>
                    <option value="A2" {% if entry.parking_lot == "A2" %}selected{% endif %}>A2</option>
                    <option value="A3" {% if entry.parking_lot == "A3" %}selected{% endif %}>A3</option>
                    <option value="B1" {% if entry.parking_lot == "B1" %}selected{% endif %}>B1</option>
                    <option value="B2" {% if entry.parking_lot == "B2" %}selected{% endif %}>B2</option>
                </select>
                </div>

                <button type="submit" class="btn btn-primary">Update</button>
                <a href="/dashboard" class="btn btn-secondary">Back</a>

            </form>

        </div>
    </div>

</body>

</html>
